name: moaday

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moaday}
      POSTGRES_USER: ${POSTGRES_USER:-moaday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moaday-local}
    ports:
      - "5432:5432"
    volumes:
      - moaday-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: moaday-api:local
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-moaday}
      DATABASE_USERNAME: ${POSTGRES_USER:-moaday}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-moaday-local}
      JWT_SECRET: ${JWT_SECRET:-moaday-local-development-secret-change-before-production-2026}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      STORAGE_PATH: /data/moaday
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_STARTTLS_ENABLED: ${MAIL_STARTTLS_ENABLED:-false}
      MAIL_STARTTLS_REQUIRED: ${MAIL_STARTTLS_REQUIRED:-false}
      MAIL_CONNECTION_TIMEOUT_MS: ${MAIL_CONNECTION_TIMEOUT_MS:-10000}
      MAIL_READ_TIMEOUT_MS: ${MAIL_READ_TIMEOUT_MS:-10000}
      MAIL_WRITE_TIMEOUT_MS: ${MAIL_WRITE_TIMEOUT_MS:-10000}
      MAIL_FROM: ${MAIL_FROM:-no-reply@moaday.local}
      MOADAY_WEB_BASE_URL: ${MOADAY_WEB_BASE_URL:-http://localhost:3000}
      COUPON_CLAIM_MINUTES: ${COUPON_CLAIM_MINUTES:-15}
    ports:
      - "8080:8080"
    volumes:
      - moaday-files:/data/moaday
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
    restart: unless-stopped

  web:
    image: moaday-web:local
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    environment:
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --protocol http2 --url http://gateway:80
    depends_on:
      gateway:
        condition: service_healthy
    restart: "no"

volumes:
  moaday-postgres:
  moaday-files:
