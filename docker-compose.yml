name: moaday

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moaday}
      POSTGRES_USER: ${POSTGRES_USER:-moaday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moaday-local}
    ports:
      - "5432:5432"
    volumes:
      - moaday-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: moaday-api:local
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-moaday}
      DATABASE_USERNAME: ${POSTGRES_USER:-moaday}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-moaday-local}
      JWT_SECRET: ${JWT_SECRET:-moaday-local-development-secret-change-before-production-2026}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      STORAGE_PATH: /data/moaday
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      COUPON_CLAIM_MINUTES: ${COUPON_CLAIM_MINUTES:-15}
    ports:
      - "8080:8080"
    volumes:
      - moaday-files:/data/moaday
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
    restart: unless-stopped

  web:
    image: moaday-web:local
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  moaday-postgres:
  moaday-files:
