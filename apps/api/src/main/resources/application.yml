spring:
  application:
    name: moaday-api
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/couponwith;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: ${PORT:8080}
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

couponwith:
  jwt:
    secret: ${JWT_SECRET:coupon-with-local-development-secret-change-before-production-2026}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

moaday:
  storage:
    path: ${STORAGE_PATH:./data/uploads}
  coupons:
    claim-minutes: ${COUPON_CLAIM_MINUTES:15}
  automation:
    interval-ms: ${AUTOMATION_INTERVAL_MS:60000}
    initial-delay-ms: ${AUTOMATION_INITIAL_DELAY_MS:30000}
    reminder-lookback-minutes: ${REMINDER_LOOKBACK_MINUTES:10}
