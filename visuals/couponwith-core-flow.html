          <div class="cw-column"><h3>알림</h3><label class="form-check form-switch"><input class="form-check-input" type="checkbox" id="event-alert" checked><span class="form-check-label">일정 리마인더</span></label><label class="form-check form-switch"><input class="form-check-input" type="checkbox" id="coupon-alert" checked><span class="form-check-label">쿠폰 만료 알림</span></label><label class="form-check form-switch"><input class="form-check-input" type="checkbox" id="comment-alert"><span class="form-check-label">댓글 이메일</span></label></div>
        </div>`
    }
  };

  function render(name) {
    const data = screens[name] || screens.today;
    title.textContent = data.title;
    eyebrow.textContent = data.eyebrow;
    primary.innerHTML = `<i data-lucide="${data.icon}" aria-hidden="true"></i><span>${data.action}</span>`;
    screen.innerHTML = data.html;
    root.querySelectorAll('[data-screen]').forEach((button) => {
      button.setAttribute('aria-pressed', button.dataset.screen === name ? 'true' : 'false');
    });
    if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
  }

  root.querySelectorAll('[data-screen]').forEach((button) => {
    button.addEventListener('click', () => render(button.dataset.screen));
  });

  render('today');
})();
</script>
