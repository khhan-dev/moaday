name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the complete repository history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject sensitive files and personal email addresses
        shell: pwsh
        run: ./scripts/check-sensitive-files.ps1

      - name: Scan Git history with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  api-tests:
    name: API tests (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/api/pom.xml

      - name: Run API test suite
        run: mvn --batch-mode --no-transfer-progress verify

  web-checks:
    name: Web lint, test and build (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint web source
        run: npm run lint

      - name: Build production web bundle
        run: npm run build

      - name: Run rendered HTML tests
        run: npm run test:render

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build API and web images
        run: docker compose build api web
